
# --------------------------------------------------------------------------------------------------------
#             SERVER
# --------------------------------------------------------------------------------------------------------

server.port=${SERVICE_PORT:8080}

# --------------------------------------------------------------------------------------------------------
#             ACTIVE-MQ
# --------------------------------------------------------------------------------------------------------
spring.activemq.broker-url=${AMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.username=${AMQ_USER:admin}
spring.activemq.password=${AMQ_USER:admin}
spring.activemq.packages.trust-all=${AMQ_PACKAGES_TRUST_ALL:true}
spring.activemq.concurrency=${AMQ_CONSUMER_CONCURRENCY:5-10}
spring.activemq.queue.name=${AMQ_QUEUE_NAME:active-mq-queue}

